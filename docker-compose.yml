services:
  postgres:
    image: postgres:18.4-alpine3.24
    container_name: kinetiq-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kinetiq}
      POSTGRES_USER: ${POSTGRES_USER:-kinetiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kinetiq}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
